<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<div class="container my-5" style="max-width: 600px;">
  <div class="card">
    <div class="card-header bg-primary text-white"><h5>Add New Food Entry</h5></div>
    <div class="card-body">
      <form>
        <div class="mb-3">
          <label class="form-label">Food Name</label>
          <input type="text" class="form-control" placeholder="e.g. Avocado">
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Calories</label>
            <input type="number" class="form-control">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Serving Description</label>
            <input type="text" class="form-control" placeholder="1 cup or 100g">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Save to Database</button>
      </form>
    </div>
  </div>
</div>
