<div class="container" style="max-width: 550px;">
  <div class="my-5">
    <h2 class="mb-4">Edit Food Entry</h2>
    <div class="card">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Food Name</label>
          <input class="form-control" placeholder="e.g. Avocado" value="Chicken Breast, Grilled">
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Calories</label>
            <input type="number" class="form-control" placeholder="0" value="165">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Serving Description</label>
            <input type="text" class="form-control" placeholder="1 cup or 100g" value="100g">
          </div>
        </div>
        <a class="btn btn-info text-white w-100 btn-lg">Save Changes to Database</a>
      </div>
    </div>
  </div>
