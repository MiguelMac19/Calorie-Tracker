<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>


 
<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Calorie<span>Track</span></a>
    <div class="d-flex gap-2">
      <a href="login.html" class="btn btn-outline-light">Log In</a>
      <a href="register.html" class="btn btn-info text-white">Sign Up Free</a>
    </div>
  </div>
</nav>

<!-- Page -->
<section class="hero">
  <div class="container">
    <h1>Welcome back</h1>
    <p class="mx-auto" style="max-width: 500px;">Log in to your CalorieTrack account</p>
  </div>
</section>

<div class="container" style="max-width: 550px;">
  <div class="my-5">
    <div class="card">
      <div class="card-body">

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" placeholder="johndoe@gmail.com">
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" placeholder="Enter your password">
        </div>

        <!-- Remember me -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label" for="remember">
            Remember me 
          </label>
        </div>

        
        <div class="alert alert-danger" style="display: none;">
          Incorrect email or password. Please try again.
        </div>

     
        <a href="dashboard.html" class="btn btn-info text-white w-100 btn-lg">Log In</a>

        <!-- Register link -->
        <div class="text-center mt-3 text-muted">
          Don't have an account?
          <a href="register.html" class="link-blue">Sign Up Free</a>
        </div>

      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
