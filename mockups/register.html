<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Calorie<span>Track</span></a>
    <div class="d-flex gap-2">
      <a href="login.html" class="btn btn-outline-light">Log In</a>
      <a href="register.html" class="btn btn-info text-white">Sign Up Free</a>
    </div>
  </div>
</nav>


<section class="hero">
  <div class="container">
    <h1>Create your free account</h1>
    <p class="mx-auto" style="max-width: 500px;">Start tracking your calories today</p>
  </div>
</section>

<div class="container" style="max-width: 550px;">
  <div class="my-5">
    <div class="card">
      <div class="card-body">

        <!-- Name row -->
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">First Name</label>
            <input class="form-control" type="text" placeholder="John">
          </div>
          <div class="col">
            <label class="form-label">Last Name</label>
            <input class="form-control" type="text" placeholder="Doe">
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input class="form-control" type="email" placeholder="john@example.com">
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" placeholder="Min. 8 characters, include a number">
          <div class="form-text">At least 8 characters and one number required.</div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" type="password" placeholder="Re-enter your password">
        </div>

        
        <div class="alert alert-danger" style="display: none;">
          Passwords do not match. Please try again.
        </div>


        <a href="dashboard.html" class="btn btn-info text-white w-100 btn-lg">Create Account</a>

       
        <div class="text-center mt-3 text-muted">
          Already have an account?
          <a href="login.html" class="link-blue">Log In</a>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
